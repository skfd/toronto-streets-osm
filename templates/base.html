<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}toronto-streets-osm{% endblock %}</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
           margin: 0; padding: 0; color: #1f2937; background: #f9fafb; }
    header { background: #111827; color: #fff; padding: 1rem 1.5rem; }
    header a { color: #93c5fd; text-decoration: none; margin-right: 1rem; }
    main { max-width: 1100px; margin: 1.2rem auto; padding: 0 1.2rem 3rem; }
    .card { background: #fff; border-radius: 6px; padding: 1rem 1.2rem;
            margin-bottom: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    h1, h2, h3 { margin: 0 0 .5rem; }
    h2 { font-size: 1.4rem; }
    h3 { font-size: 1.1rem; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: .4rem; font-size: .9rem; }
    th, td { text-align: left; padding: .35rem .6rem; border-bottom: 1px solid #e5e7eb; }
    th { background: #f3f4f6; font-weight: 600; }
    tr:hover td { background: #fafbfc; }
    code { background: #f3f4f6; padding: 0 4px; border-radius: 3px;
           font-size: .85em; color: #374151; }
    .muted { color: #6b7280; font-size: .9em; }
    .pill { display: inline-block; padding: 1px 8px; border-radius: 999px;
            font-size: .8rem; font-weight: 600; }
    .pill.ok   { background: #d1fae5; color: #065f46; }
    .pill.warn { background: #fef3c7; color: #78350f; }
    .pill.bad  { background: #fee2e2; color: #991b1b; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <header>
    <a href="../index.html"><strong>toronto-streets-osm</strong></a>
    <a href="../index.html">Home</a>
    <span class="muted" style="float: right;">© <a href="https://www.openstreetmap.org/copyright">OSM</a> ·
      <a href="https://open.toronto.ca/open-data-licence/">Toronto Open Data</a></span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
